apiVersion: v1
kind: Namespace
metadata:
  name: slo-demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: slo-demo
  namespace: slo-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: slo-demo
  template:
    metadata:
      labels:
        app: slo-demo
    spec:
      containers:
      - name: slo-demo
        image: ghcr.io/strugi032/slo-demo:0.1.0
        ports:
        - name: http
          containerPort: 8080
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: slo-demo
  namespace: slo-demo
spec:
  selector:
    app: slo-demo
  ports:
  - name: http
    port: 80
    targetPort: http
